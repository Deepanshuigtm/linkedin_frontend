# Netlify configuration
[build]
  command = "npm run build"
  publish = "dist"

# Environment variables
[build.environment]
  VITE_API_BASE_URL = "https://linkdin-automation-backend.onrender.com"
  VITE_WS_BASE_URL = "wss://linkdin-automation-backend.onrender.com"

# Redirects for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
